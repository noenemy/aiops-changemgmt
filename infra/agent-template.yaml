AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  AIOps Change Management v2 — Bedrock Agent + Action Group + KB
  3 Persona (CodeReviewer / InfraReviewer / RiskJudge) with 11 tools

Parameters:
  GitHubTokenSecretArn:
    Type: String
  SlackBotTokenSecretArn:
    Type: String
  SlackChannelId:
    Type: String
  GitHubRepo:
    Type: String
    Default: noenemy/aiops-changemgmt
  AgentModelId:
    Type: String
    Default: apac.anthropic.claude-sonnet-4-20250514-v1:0
  KnowledgeBaseId:
    Type: String
    Description: Bedrock Knowledge Base ID (from main stack output)
  ReviewHistoryTableName:
    Type: String
  DeveloperProfilesTableName:
    Type: String
  TeamStatsTableName:
    Type: String
  # --- Optional: DevOps / Security sub-agent endpoints (stubs if empty) ---
  DevopsAgentId:
    Type: String
    Default: ""
  DevopsAgentAliasId:
    Type: String
    Default: ""
  DevopsAgentRegion:
    Type: String
    Default: us-east-1
  SecurityAgentId:
    Type: String
    Default: ""
  SecurityAgentAliasId:
    Type: String
    Default: ""
  SecurityAgentRegion:
    Type: String
    Default: us-east-1

Resources:
  # ============================================================
  # Agent Execution Role
  # ============================================================
  AgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-agent-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockAndKB
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:Retrieve
                  - bedrock:RetrieveAndGenerate
                Resource: "*"

  # ============================================================
  # Action Group Lambda Role
  # ============================================================
  ActionGroupFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-action-group-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  - !Ref GitHubTokenSecretArn
                  - !Ref SlackBotTokenSecretArn
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ReviewHistoryTableName}
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DeveloperProfilesTableName}
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${TeamStatsTableName}
        - PolicyName: CrossRegionAgentInvoke
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: bedrock:InvokeAgent
                Resource: "*"

  # ============================================================
  # Action Group Lambda
  # ============================================================
  ActionGroupFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-action-group
      Handler: action_group_handler.handler
      Runtime: python3.13
      CodeUri: ../agent/
      MemorySize: 512
      Timeout: 120
      Role: !GetAtt ActionGroupFunctionRole.Arn
      Environment:
        Variables:
          GITHUB_TOKEN_SECRET_ARN: !Ref GitHubTokenSecretArn
          SLACK_TOKEN_SECRET_ARN: !Ref SlackBotTokenSecretArn
          SLACK_CHANNEL_ID: !Ref SlackChannelId
          GITHUB_REPO: !Ref GitHubRepo
          REVIEW_HISTORY_TABLE: !Ref ReviewHistoryTableName
          DEVELOPER_PROFILES_TABLE: !Ref DeveloperProfilesTableName
          TEAM_STATS_TABLE: !Ref TeamStatsTableName
          DEVOPS_AGENT_ID: !Ref DevopsAgentId
          DEVOPS_AGENT_ALIAS_ID: !Ref DevopsAgentAliasId
          DEVOPS_AGENT_REGION: !Ref DevopsAgentRegion
          SECURITY_AGENT_ID: !Ref SecurityAgentId
          SECURITY_AGENT_ALIAS_ID: !Ref SecurityAgentAliasId
          SECURITY_AGENT_REGION: !Ref SecurityAgentRegion

  ActionGroupFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ActionGroupFunction
      Action: lambda:InvokeFunction
      Principal: bedrock.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

  # ============================================================
  # Bedrock Agent
  # ============================================================
  ChangeManagementAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      AgentName: !Sub ${AWS::StackName}-orchestrator
      Description: AIOps ChangeManagement 오케스트레이터 (CodeReviewer + InfraReviewer + RiskJudge)
      AgentResourceRoleArn: !GetAtt AgentRole.Arn
      FoundationModel: !Ref AgentModelId
      IdleSessionTTLInSeconds: 900
      Instruction: |
        당신은 AIOps ChangeManagement 오케스트레이터입니다.
        PR 유형에 따라 3개 Persona(CodeReviewer/InfraReviewer/RiskJudge)를 전환하며 분석합니다.

        # 작업 순서
        1. detect_change_type(pr_number) → code / iac / mixed 판별
        2. get_pr_diff, get_pr_files 로 변경 내용 파악
        3. 유형별 Persona 활성화
           - code: CodeReviewer / iac: InfraReviewer / mixed: 두 Persona 순차
        4. 각 Persona는 queryKnowledgeBase 와 DDB 도구 활용
        5. RiskJudge 가 종합해 Risk Score, Verdict 결정
        6. post_github_comment + post_slack_report 로 결과 전달

        # Persona
        - CodeReviewer: 보안/성능/안정성/호환성. 도구: queryKnowledgeBase, get_review_history, get_developer_profile, invoke_security_agent. 의심 패턴은 KB 검색, 보안 HIGH/CRITICAL은 invoke_security_agent.
        - InfraReviewer: *.yaml/*.tf, infra/**, terraform/**, cdk/**, k8s/**, helm/**. 분석축: 리소스 영향/IAM/데이터 보존/비용/Drift. 도구: queryKnowledgeBase, invoke_devops_agent, invoke_security_agent. IAM 변경은 반드시 invoke_security_agent, Replacement 유발은 경고.
        - RiskJudge: 종합해 Risk Score 산출. 0-20 LOW APPROVE / 21-50 MEDIUM APPROVE / 51-80 HIGH REJECT / 81-100 CRITICAL REJECT. CRITICAL 1개↑ 또는 HIGH 2개↑ → REJECT. SESSION_SUMMARY Memory에서 반복 패턴 확인 시 가중치 +10~20.

        # 출력
        - GitHub 코멘트: 마크다운(risk score + 판정 + 이슈 + 과거 장애 + 개발자 패턴)
        - Slack: post_slack_report 에 JSON 문자열 전달. 필드: pr_number, pr_title, pr_author, pr_url, change_type, risk_score, risk_level, verdict, summary(한국어), issues_text, incident_match, developer_pattern, infra_impact, agent_persona. 없으면 빈 문자열. 템플릿은 change_type 기반 자동 선택.

        # 원칙
        - 하드코딩 금지: 장애/정책은 queryKnowledgeBase
        - 한국어 응답, 근거 필수
        - Stub 서브 에이전트("source":"stub")는 부분 반영

      MemoryConfiguration:
        EnabledMemoryTypes:
          - SESSION_SUMMARY
        StorageDays: 30

      KnowledgeBases:
        - KnowledgeBaseId: !Ref KnowledgeBaseId
          Description: "과거 장애, 운영 런북, 리뷰 정책 검색."
          KnowledgeBaseState: ENABLED

      ActionGroups:
        - ActionGroupName: ChangeManagementTools
          Description: 모든 PR/DDB/SubAgent/GitHub/Slack 도구를 포함한 Action Group
          ActionGroupExecutor:
            Lambda: !GetAtt ActionGroupFunction.Arn
          FunctionSchema:
            Functions:
              # --- PR ---
              - Name: get_pr_diff
                Description: GitHub Pull Request의 diff를 가져옵니다.
                Parameters:
                  pr_number: { Type: integer, Description: PR 번호, Required: true }
              - Name: get_pr_files
                Description: PR에서 변경된 파일 목록(JSON)을 가져옵니다.
                Parameters:
                  pr_number: { Type: integer, Description: PR 번호, Required: true }
              - Name: detect_change_type
                Description: PR 변경 파일을 분석하여 code/iac/mixed 판별. 반환 JSON에 iac_files, code_files 포함.
                Parameters:
                  pr_number: { Type: integer, Description: PR 번호, Required: true }
              # --- DDB ---
              - Name: get_review_history
                Description: 과거 리뷰 이력을 조회합니다. author 또는 files(콤마구분)로 필터 가능.
                Parameters:
                  author: { Type: string, Description: PR 작성자 (선택), Required: false }
                  files:  { Type: string, Description: 콤마구분 파일 basename (선택), Required: false }
                  limit:  { Type: integer, Description: 최대 결과 수(기본 5), Required: false }
              - Name: get_developer_profile
                Description: 개발자 프로파일을 DDB에서 조회합니다. 강점/약점/반복 패턴 포함.
                Parameters:
                  author: { Type: string, Description: 개발자 ID (GitHub login), Required: true }
              # --- Sub-Agents (Agent-as-Tool Stubs) ---
              - Name: invoke_devops_agent
                Description: DevOps 전문 서브 에이전트 호출. 인프라/배포/CI-CD 관련 질의에 사용. 실체가 연결되지 않은 경우 stub 응답 반환.
                Parameters:
                  query:   { Type: string, Description: DevOps Agent에게 물어볼 질의, Required: true }
                  context: { Type: string, Description: 관련 컨텍스트(diff 요약 등), Required: false }
              - Name: invoke_security_agent
                Description: Security 전문 서브 에이전트 호출. 보안/IAM/컴플라이언스 관련 질의에 사용.
                Parameters:
                  query:   { Type: string, Description: Security Agent에게 물어볼 질의, Required: true }
                  context: { Type: string, Description: 관련 컨텍스트, Required: false }
              # --- Output ---
              - Name: post_github_comment
                Description: PR에 리뷰 코멘트(마크다운)를 작성. /fix 커맨드인 경우 본문 앞에 '## 🔧 AI Fix Suggestion'을 붙여 구분.
                Parameters:
                  pr_number:    { Type: integer, Description: PR 번호, Required: true }
                  comment_body: { Type: string,  Description: 마크다운 코멘트 본문, Required: true }
              - Name: post_slack_report
                Description: Slack 채널에 분석 리포트를 전송합니다. 템플릿은 report_json.change_type에 따라 자동 선택.
                Parameters:
                  report_json: { Type: string, Description: "JSON 문자열: {pr_number, pr_title, pr_author, pr_url, change_type, risk_score, risk_level, verdict, summary, issues_text, incident_match, developer_pattern, infra_impact, agent_persona, template(선택)}", Required: true }

  # Agent Alias (prod)
  AgentAlias:
    Type: AWS::Bedrock::AgentAlias
    Properties:
      AgentId: !Ref ChangeManagementAgent
      AgentAliasName: prod
      Description: Production alias

Outputs:
  AgentId:
    Description: Bedrock Agent ID
    Value: !Ref ChangeManagementAgent
  AgentAliasId:
    Description: Agent Alias ID (prod)
    Value: !GetAtt AgentAlias.AgentAliasId
  ActionGroupFunctionArn:
    Description: Action Group Lambda ARN
    Value: !GetAtt ActionGroupFunction.Arn
