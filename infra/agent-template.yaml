AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  AIOps Change Management — Bedrock Agent + Action Group
  Agent Runtime + Memory + GitHub/Slack Action Group

Parameters:
  GitHubTokenSecretArn:
    Type: String
    Description: ARN of the GitHub PAT secret in Secrets Manager
  SlackBotTokenSecretArn:
    Type: String
    Description: ARN of the Slack Bot Token secret in Secrets Manager
  SlackChannelId:
    Type: String
    Description: Slack channel ID
  GitHubRepo:
    Type: String
    Default: noenemy/aiops-changemgmt
  AgentModelId:
    Type: String
    Default: apac.anthropic.claude-sonnet-4-20250514-v1:0
    Description: Bedrock inference profile ID for the Agent
  SchemaS3Bucket:
    Type: String
    Description: S3 bucket containing the Action Group schema

Resources:
  # ============================================================
  # Agent Execution Role
  # ============================================================
  AgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-agent-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockModelAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: "*"

  # ============================================================
  # Action Group Lambda
  # ============================================================
  ActionGroupFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-action-group-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  - !Ref GitHubTokenSecretArn
                  - !Ref SlackBotTokenSecretArn

  ActionGroupFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-action-group
      Handler: action_group_handler.handler
      Runtime: python3.13
      CodeUri: ../agent/
      MemorySize: 512
      Timeout: 120
      Role: !GetAtt ActionGroupFunctionRole.Arn
      Environment:
        Variables:
          GITHUB_TOKEN_SECRET_ARN: !Ref GitHubTokenSecretArn
          SLACK_TOKEN_SECRET_ARN: !Ref SlackBotTokenSecretArn
          SLACK_CHANNEL_ID: !Ref SlackChannelId
          GITHUB_REPO: !Ref GitHubRepo

  ActionGroupFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ActionGroupFunction
      Action: lambda:InvokeFunction
      Principal: bedrock.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

  # ============================================================
  # Bedrock Agent
  # ============================================================
  CodeReviewAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      AgentName: !Sub ${AWS::StackName}-code-reviewer
      Description: AI 코드 리뷰 에이전트 — PR 분석, 리스크 판정, Memory 기반 개발자 패턴 추적
      AgentResourceRoleArn: !GetAtt AgentRole.Arn
      FoundationModel: !Ref AgentModelId
      IdleSessionTTLInSeconds: 900
      Instruction: |
        당신은 시니어 소프트웨어 엔지니어이자 보안/성능 전문 AI 코드 리뷰 에이전트입니다.
        GitHub Pull Request의 변경 내용을 분석하고, 리스크를 평가합니다.

        ## 작업 순서
        1. get_pr_diff 도구로 PR의 diff를 가져옵니다.
        2. get_pr_files 도구로 변경된 파일 목록을 가져옵니다.
        3. diff와 파일을 분석하여 리스크를 평가합니다.
        4. 과거 세션 Memory를 참조하여 이 개발자 또는 이 파일의 이전 리뷰 패턴이 있으면 반영합니다.
        5. post_github_comment 도구로 PR에 리뷰 코멘트를 작성합니다.
        6. post_slack_report 도구로 Slack에 리포트를 전송합니다.

        ## 분석 기준
        1. 보안: 시크릿 노출, Injection, PII 로깅, 인증/인가 우회
        2. 성능: N+1 쿼리, 페이지네이션 부재, 타임아웃 위험
        3. 안정성: Race Condition, 보상 트랜잭션 부재, 에러 핸들링 누락
        4. 호환성: Breaking API Change, 하위 호환성 파괴

        ## 과거 장애 이력 (반드시 참조)
        - INC-0042 (2026-01-15, P1): 주문 폭주 시 재고 마이너스 발생. 원인: create_order.py Race Condition. 영향: 다운타임 2시간, 매출 손실 12,000,000원
        - INC-0038 (2025-11-22, P2): API 응답 필드 변경으로 모바일 앱 크래시. 원인: get_order.py Breaking Change. 영향: 다운타임 45분, 매출 손실 3,500,000원
        - INC-0041 (2025-12-20, P1): N+1 쿼리로 DynamoDB 쓰로틀링. 원인: list_orders.py for 루프 개별 get_item. 영향: 다운타임 1시간 30분, 매출 손실 10,300,000원
        - INC-0045 (2026-02-08, P1): 결제 API 키 소스코드 노출. 원인: process_payment.py 시크릿 하드코딩. 영향: 시크릿 로테이션 4시간, 보안 감사 비용 5,000,000원

        위 장애와 유사한 패턴이 PR에서 발견되면 반드시 장애 ID, 날짜, 영향도를 언급하세요.

        ## Memory 활용
        이전 세션에서 분석한 PR 이력이 Memory에 있을 수 있습니다.
        - 같은 개발자의 과거 리뷰에서 반복되는 패턴이 있으면 지적하세요.
        - 레포 전체의 Risk Score 추세가 상승 중이면 언급하세요.

        ## Risk Score 기준
        - 0-20: LOW (안전, 자동 승인)
        - 21-50: MEDIUM (주의 필요)
        - 51-80: HIGH (배포 차단 권장)
        - 81-100: CRITICAL (즉시 차단)

        ## GitHub 코멘트 형식
        마크다운: Risk Score + 이모지 + 판정 + 이슈 목록 + 과거 장애 연관 + 개발자 패턴

        ## Slack 리포트
        post_slack_report에 report_json (pr_number, pr_title, pr_author, risk_score, risk_level, verdict, summary, issues_text) 전달
      MemoryConfiguration:
        EnabledMemoryTypes:
          - SESSION_SUMMARY
        StorageDays: 365
      ActionGroups:
        - ActionGroupName: GitHubSlackTools
          Description: GitHub PR diff 조회, 코멘트 작성, Slack 리포트 전송 도구
          ActionGroupExecutor:
            Lambda: !GetAtt ActionGroupFunction.Arn
          FunctionSchema:
            Functions:
              - Name: get_pr_diff
                Description: GitHub Pull Request의 diff를 가져옵니다.
                Parameters:
                  pr_number:
                    Type: integer
                    Description: PR 번호
                    Required: true
              - Name: get_pr_files
                Description: PR에서 변경된 파일 목록을 가져옵니다.
                Parameters:
                  pr_number:
                    Type: integer
                    Description: PR 번호
                    Required: true
              - Name: post_github_comment
                Description: PR에 리뷰 코멘트를 작성합니다.
                Parameters:
                  pr_number:
                    Type: integer
                    Description: PR 번호
                    Required: true
                  comment_body:
                    Type: string
                    Description: 마크다운 형식의 리뷰 코멘트
                    Required: true
              - Name: post_slack_report
                Description: Slack 채널에 분석 리포트를 전송합니다.
                Parameters:
                  report_json:
                    Type: string
                    Description: "JSON: {pr_number, pr_title, pr_author, risk_score, risk_level, verdict, summary, issues_text}"
                    Required: true

  # Agent Alias (prod)
  AgentAlias:
    Type: AWS::Bedrock::AgentAlias
    Properties:
      AgentId: !Ref CodeReviewAgent
      AgentAliasName: prod
      Description: Production alias

Outputs:
  AgentId:
    Description: Bedrock Agent ID
    Value: !Ref CodeReviewAgent
  AgentAliasId:
    Description: Agent Alias ID (prod)
    Value: !GetAtt AgentAlias.AgentAliasId
  ActionGroupFunctionArn:
    Description: Action Group Lambda ARN
    Value: !GetAtt ActionGroupFunction.Arn
