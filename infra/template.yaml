AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  AIOps Change Management v3 — Webhook + Analysis + KB(S3 Vectors) + Slack Commands (us-east-1, AgentCore backed)

Parameters:
  GitHubToken:
    Type: String
    NoEcho: true
  GitHubRepo:
    Type: String
    Default: noenemy/aiops-changemgmt
  GitHubWebhookSecret:
    Type: String
    NoEcho: true
    Default: changeme-webhook-secret
  SlackBotToken:
    Type: String
    NoEcho: true
  SlackSigningSecret:
    Type: String
    NoEcho: true
    Default: changeme-slack-signing-secret
  SlackChannelId:
    Type: String
  BedrockModelId:
    Type: String
    Default: global.anthropic.claude-sonnet-4-6
  EmbeddingModelArn:
    Type: String
    Default: arn:aws:bedrock:us-east-1::foundation-model/amazon.titan-embed-text-v2:0
  DevOpsWebhookUrl:
    Type: String
    Default: ""
    Description: AIOps Investigation Groups generic webhook URL for /investigate
  DevOpsWebhookSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: Shared secret used to sign x-amzn-event-signature

Resources:
  # ============================================================
  # Secrets Manager
  # ============================================================
  GitHubTokenSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${AWS::StackName}/github-token
      SecretString: !Ref GitHubToken

  SlackBotTokenSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${AWS::StackName}/slack-bot-token
      SecretString: !Ref SlackBotToken

  SlackSigningSecretSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${AWS::StackName}/slack-signing-secret
      SecretString: !Ref SlackSigningSecret

  # ============================================================
  # S3 — KB source data bucket
  # Notifications configured manually post-deploy (see docs/infrastructure.md)
  # ============================================================
  KBDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${AWS::StackName}-kb-data-${AWS::AccountId}-${AWS::Region}
      VersioningConfiguration:
        Status: Enabled

  # ============================================================
  # S3 Vectors — KB vector store
  # ============================================================
  VectorBucket:
    Type: AWS::S3Vectors::VectorBucket
    Properties:
      VectorBucketName: !Sub ${AWS::StackName}-vectors-${AWS::AccountId}-${AWS::Region}

  VectorIndex:
    Type: AWS::S3Vectors::Index
    DependsOn: VectorBucket
    Properties:
      VectorBucketName: !Sub ${AWS::StackName}-vectors-${AWS::AccountId}-${AWS::Region}
      IndexName: aiops-kb-index
      DataType: float32
      Dimension: 1024
      DistanceMetric: cosine

  # ============================================================
  # DynamoDB — 3 tables
  # ============================================================
  ReviewHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-review-history
      AttributeDefinitions:
        - AttributeName: prKey
          AttributeType: S
        - AttributeName: reviewedAt
          AttributeType: S
      KeySchema:
        - AttributeName: prKey
          KeyType: HASH
        - AttributeName: reviewedAt
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  DeveloperProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-developer-profiles
      AttributeDefinitions:
        - AttributeName: author
          AttributeType: S
      KeySchema:
        - AttributeName: author
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  TeamStatsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-team-stats
      AttributeDefinitions:
        - AttributeName: teamId
          AttributeType: S
        - AttributeName: period
          AttributeType: S
      KeySchema:
        - AttributeName: teamId
          KeyType: HASH
        - AttributeName: period
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  # ============================================================
  # Bedrock KnowledgeBase (S3 Vectors)
  # ============================================================
  KBServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-kb-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KBDataAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${AWS::StackName}-kb-data-${AWS::AccountId}-${AWS::Region}
                  - !Sub arn:aws:s3:::${AWS::StackName}-kb-data-${AWS::AccountId}-${AWS::Region}/*
              - Effect: Allow
                Action:
                  - s3vectors:*
                Resource: "*"
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: !Ref EmbeddingModelArn

  KnowledgeBase:
    Type: AWS::Bedrock::KnowledgeBase
    DependsOn: VectorIndex
    Properties:
      Name: !Sub ${AWS::StackName}-kb
      Description: KB for AIOps ChangeManagement — incidents, runbooks, policies
      RoleArn: !GetAtt KBServiceRole.Arn
      KnowledgeBaseConfiguration:
        Type: VECTOR
        VectorKnowledgeBaseConfiguration:
          EmbeddingModelArn: !Ref EmbeddingModelArn
      StorageConfiguration:
        Type: S3_VECTORS
        S3VectorsConfiguration:
          VectorBucketArn: !GetAtt VectorBucket.VectorBucketArn
          IndexName: aiops-kb-index

  # Note: InclusionPrefixes omitted due to CFN early-validation bug with
  # multiple prefixes. Instead, we upload ONLY kb-relevant folders (incidents,
  # runbooks, policies) to this bucket. deploy-history/ stays out of S3.
  KBDataSource:
    Type: AWS::Bedrock::DataSource
    DependsOn: KBDataBucket
    Properties:
      Name: !Sub ${AWS::StackName}-kb-s3
      KnowledgeBaseId: !Ref KnowledgeBase
      DataSourceConfiguration:
        Type: S3
        S3Configuration:
          BucketArn: !GetAtt KBDataBucket.Arn

  # ============================================================
  # KB Reindex Lambda (S3 event → StartIngestionJob)
  # S3 NotificationConfiguration set post-deploy via CLI.
  # ============================================================
  KBReindexFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-kb-reindex-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: StartIngestion
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:StartIngestionJob
                  - bedrock:ListDataSources
                Resource: "*"

  KBReindexFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-kb-reindex
      Handler: reindex_handler.handler
      Runtime: python3.13
      CodeUri: kb-reindex/
      MemorySize: 256
      Timeout: 30
      Role: !GetAtt KBReindexFunctionRole.Arn
      Environment:
        Variables:
          KNOWLEDGE_BASE_ID: !Ref KnowledgeBase

  KBReindexPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref KBReindexFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub arn:aws:s3:::${AWS::StackName}-kb-data-${AWS::AccountId}-${AWS::Region}

  # ============================================================
  # Webhook API Gateway
  # ============================================================
  WebhookApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Description: GitHub Webhook + Slack Slash Commands

  WebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-webhook
      Handler: webhook_handler.handler
      Runtime: python3.13
      CodeUri: webhook/
      MemorySize: 256
      Timeout: 30
      Environment:
        Variables:
          ANALYSIS_FUNCTION_NAME: !Ref AnalysisFunction
          GITHUB_WEBHOOK_SECRET: !Ref GitHubWebhookSecret
      Events:
        Webhook:
          Type: Api
          Properties:
            RestApiId: !Ref WebhookApi
            Path: /webhook
            Method: post
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref AnalysisFunction

  SlackCommandFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-slack-command
      Handler: slack_command_handler.handler
      Runtime: python3.13
      CodeUri: slack-commands/
      MemorySize: 256
      Timeout: 10
      Environment:
        Variables:
          ANALYSIS_FUNCTION_NAME: !Ref AnalysisFunction
          SLACK_SIGNING_SECRET_ARN: !Ref SlackSigningSecretSecret
          GITHUB_REPO: !Ref GitHubRepo
          GITHUB_TOKEN_SECRET_ARN: !Ref GitHubTokenSecret
      Events:
        SlackCommand:
          Type: Api
          Properties:
            RestApiId: !Ref WebhookApi
            Path: /slack/commands
            Method: post
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref AnalysisFunction
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource:
                - !Ref SlackSigningSecretSecret
                - !Ref GitHubTokenSecret

  AnalysisFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-analysis
      Handler: analysis_handler.handler
      Runtime: python3.13
      CodeUri: webhook/
      MemorySize: 1024
      Timeout: 300
      Environment:
        Variables:
          GITHUB_TOKEN_SECRET_ARN: !Ref GitHubTokenSecret
          SLACK_TOKEN_SECRET_ARN: !Ref SlackBotTokenSecret
          SLACK_CHANNEL_ID: !Ref SlackChannelId
          GITHUB_REPO: !Ref GitHubRepo
          # Set by deploy-time override once AgentCore Runtime stack is deployed.
          AGENT_RUNTIME_ARN: "none"
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          REVIEW_HISTORY_TABLE: !Ref ReviewHistoryTable
          DEVELOPER_PROFILES_TABLE: !Ref DeveloperProfilesTable
          TEAM_STATS_TABLE: !Ref TeamStatsTable
          KNOWLEDGE_BASE_ID: !Ref KnowledgeBase
          DEVOPS_WEBHOOK_URL: !Ref DevOpsWebhookUrl
          DEVOPS_WEBHOOK_SECRET: !Ref DevOpsWebhookSecret
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Ref GitHubTokenSecret
                - !Ref SlackBotTokenSecret
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
                - bedrock:Retrieve
                - bedrock:RetrieveAndGenerate
                - bedrock-agentcore:InvokeAgentRuntime
              Resource: "*"
        - DynamoDBCrudPolicy:
            TableName: !Ref ReviewHistoryTable
        - DynamoDBReadPolicy:
            TableName: !Ref DeveloperProfilesTable
        - DynamoDBReadPolicy:
            TableName: !Ref TeamStatsTable

Outputs:
  WebhookUrl:
    Value: !Sub https://${WebhookApi}.execute-api.${AWS::Region}.amazonaws.com/prod/webhook
  SlackCommandUrl:
    Value: !Sub https://${WebhookApi}.execute-api.${AWS::Region}.amazonaws.com/prod/slack/commands
  KBDataBucketName:
    Value: !Ref KBDataBucket
  KnowledgeBaseId:
    Value: !Ref KnowledgeBase
  ReviewHistoryTableName:
    Value: !Ref ReviewHistoryTable
  DeveloperProfilesTableName:
    Value: !Ref DeveloperProfilesTable
  TeamStatsTableName:
    Value: !Ref TeamStatsTable
  KBReindexFunctionArn:
    Value: !GetAtt KBReindexFunction.Arn
  KBReindexFunctionName:
    Value: !Ref KBReindexFunction
  AnalysisFunctionName:
    Value: !Ref AnalysisFunction
  GitHubTokenSecretArn:
    Value: !Ref GitHubTokenSecret
  SlackBotTokenSecretArn:
    Value: !Ref SlackBotTokenSecret
  SlackSigningSecretArn:
    Value: !Ref SlackSigningSecretSecret
