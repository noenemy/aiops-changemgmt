AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AIOps Change Management - Sample Order Management App

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC that Lambda functions will attach to
  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnets for Lambda ENIs

Globals:
  Function:
    Runtime: python3.13
    MemorySize: 512
    Timeout: 30
    Environment:
      Variables:
        ORDERS_TABLE: !Ref OrdersTable
        PRODUCTS_TABLE: !Ref ProductsTable
        INVENTORY_TABLE: !Ref InventoryTable
    # Move Lambdas into the VPC so they can reach the RDS instance.
    VpcConfig:
      SecurityGroupIds:
        - !Ref LambdaSecurityGroup
      SubnetIds: !Ref PrivateSubnetIds

Resources:
  # Security group for all app Lambdas.
  # NOTE: Egress is tightened to 10.0.0.0/8 (internal VPC CIDR) only.
  # Reasoning from the PR author: "least privilege — internal traffic only".
  # (VPC Endpoints for DynamoDB / Secrets Manager / STS are NOT provisioned.)
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: AIOps Lambda egress (locked down to internal CIDR)
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 10.0.0.0/8
          Description: HTTPS to internal services only
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 10.0.0.0/8
          Description: MySQL to RDS
      SecurityGroupIngress: []
      Tags:
        - Key: Environment
          Value: prod

  # API Gateway
  OrdersApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Description: Orders Management API

  # Lambda Functions
  GetOrdersFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get_orders.handler
      CodeUri: src/handlers/
      Events:
        GetOrders:
          Type: Api
          Properties:
            RestApiId: !Ref OrdersApi
            Path: /orders
            Method: get
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref OrdersTable
        - VPCAccessPolicy: {}

  GetOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get_order.handler
      CodeUri: src/handlers/
      Events:
        GetOrder:
          Type: Api
          Properties:
            RestApiId: !Ref OrdersApi
            Path: /orders/{orderId}
            Method: get
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref OrdersTable
        - VPCAccessPolicy: {}

  CreateOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: create_order.handler
      CodeUri: src/handlers/
      Events:
        CreateOrder:
          Type: Api
          Properties:
            RestApiId: !Ref OrdersApi
            Path: /orders
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InventoryTable
        - VPCAccessPolicy: {}

  GetProductsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get_products.handler
      CodeUri: src/handlers/
      Events:
        GetProducts:
          Type: Api
          Properties:
            RestApiId: !Ref OrdersApi
            Path: /products
            Method: get
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ProductsTable
        - VPCAccessPolicy: {}

  # DynamoDB Tables
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-orders
      AttributeDefinitions:
        - AttributeName: orderId
          AttributeType: S
      KeySchema:
        - AttributeName: orderId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  ProductsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-products
      AttributeDefinitions:
        - AttributeName: productId
          AttributeType: S
      KeySchema:
        - AttributeName: productId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  InventoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-inventory
      AttributeDefinitions:
        - AttributeName: productId
          AttributeType: S
      KeySchema:
        - AttributeName: productId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub https://${OrdersApi}.execute-api.${AWS::Region}.amazonaws.com/prod/
  OrdersTableName:
    Description: Orders DynamoDB table name
    Value: !Ref OrdersTable
  ProductsTableName:
    Description: Products DynamoDB table name
    Value: !Ref ProductsTable
  InventoryTableName:
    Description: Inventory DynamoDB table name
    Value: !Ref InventoryTable
