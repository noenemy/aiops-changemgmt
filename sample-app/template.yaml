AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AIOps Change Management - Sample Order Management App

Globals:
  Function:
    Runtime: python3.12
    MemorySize: 512
    Timeout: 30
    Environment:
      Variables:
        ORDERS_TABLE: !Ref OrdersTable
        PRODUCTS_TABLE: !Ref ProductsTable
        INVENTORY_TABLE: !Ref InventoryTable

Resources:
  # API Gateway
  OrdersApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Description: Orders Management API

  # Lambda Functions
  GetOrdersFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get_orders.handler
      CodeUri: src/handlers/
      Events:
        GetOrders:
          Type: Api
          Properties:
            RestApiId: !Ref OrdersApi
            Path: /orders
            Method: get
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref OrdersTable

  GetOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get_order.handler
      CodeUri: src/handlers/
      Events:
        GetOrder:
          Type: Api
          Properties:
            RestApiId: !Ref OrdersApi
            Path: /orders/{orderId}
            Method: get
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref OrdersTable

  CreateOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: create_order.handler
      CodeUri: src/handlers/
      Events:
        CreateOrder:
          Type: Api
          Properties:
            RestApiId: !Ref OrdersApi
            Path: /orders
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InventoryTable

  GetProductsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get_products.handler
      CodeUri: src/handlers/
      Events:
        GetProducts:
          Type: Api
          Properties:
            RestApiId: !Ref OrdersApi
            Path: /products
            Method: get
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ProductsTable

  # DynamoDB Tables
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-orders
      AttributeDefinitions:
        - AttributeName: orderId
          AttributeType: S
      KeySchema:
        - AttributeName: orderId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  ProductsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-products
      AttributeDefinitions:
        - AttributeName: productId
          AttributeType: S
      KeySchema:
        - AttributeName: productId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  InventoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-inventory
      AttributeDefinitions:
        - AttributeName: productId
          AttributeType: S
      KeySchema:
        - AttributeName: productId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub https://${OrdersApi}.execute-api.${AWS::Region}.amazonaws.com/prod/
  OrdersTableName:
    Description: Orders DynamoDB table name
    Value: !Ref OrdersTable
  ProductsTableName:
    Description: Products DynamoDB table name
    Value: !Ref ProductsTable
  InventoryTableName:
    Description: Inventory DynamoDB table name
    Value: !Ref InventoryTable
