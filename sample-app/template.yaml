AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AIOps Change Management - Sample Order Management App

Globals:
  Function:
    Runtime: python3.13
    MemorySize: 512
    Timeout: 30
    Environment:
      Variables:
        ORDERS_TABLE: !Ref OrdersTable
        PRODUCTS_TABLE: !Ref ProductsTable
        INVENTORY_TABLE: !Ref InventoryTable
    Tags:
      Environment: prod
      Owner: orders-platform
      CostCenter: CC-1042
      Project: aiops-changemgmt

Resources:
  # API Gateway
  OrdersApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Description: Orders Management API
      Tags:
        Environment: prod
        Owner: orders-platform
        CostCenter: CC-1042
        Project: aiops-changemgmt

  # Lambda Functions
  GetOrdersFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get_orders.handler
      CodeUri: src/handlers/
      Events:
        GetOrders:
          Type: Api
          Properties:
            RestApiId: !Ref OrdersApi
            Path: /orders
            Method: get
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref OrdersTable

  GetOrdersFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${GetOrdersFunction}
      RetentionInDays: 90
      Tags:
        - Key: Environment
          Value: prod
        - Key: Owner
          Value: orders-platform
        - Key: CostCenter
          Value: CC-1042
        - Key: Project
          Value: aiops-changemgmt

  GetOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get_order.handler
      CodeUri: src/handlers/
      Events:
        GetOrder:
          Type: Api
          Properties:
            RestApiId: !Ref OrdersApi
            Path: /orders/{orderId}
            Method: get
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref OrdersTable

  GetOrderFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${GetOrderFunction}
      RetentionInDays: 90
      Tags:
        - Key: Environment
          Value: prod
        - Key: Owner
          Value: orders-platform
        - Key: CostCenter
          Value: CC-1042
        - Key: Project
          Value: aiops-changemgmt

  CreateOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: create_order.handler
      CodeUri: src/handlers/
      Events:
        CreateOrder:
          Type: Api
          Properties:
            RestApiId: !Ref OrdersApi
            Path: /orders
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InventoryTable

  CreateOrderFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${CreateOrderFunction}
      RetentionInDays: 90
      Tags:
        - Key: Environment
          Value: prod
        - Key: Owner
          Value: orders-platform
        - Key: CostCenter
          Value: CC-1042
        - Key: Project
          Value: aiops-changemgmt

  GetProductsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get_products.handler
      CodeUri: src/handlers/
      Events:
        GetProducts:
          Type: Api
          Properties:
            RestApiId: !Ref OrdersApi
            Path: /products
            Method: get
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ProductsTable

  GetProductsFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${GetProductsFunction}
      RetentionInDays: 90
      Tags:
        - Key: Environment
          Value: prod
        - Key: Owner
          Value: orders-platform
        - Key: CostCenter
          Value: CC-1042
        - Key: Project
          Value: aiops-changemgmt

  # DynamoDB Tables
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-orders
      AttributeDefinitions:
        - AttributeName: orderId
          AttributeType: S
      KeySchema:
        - AttributeName: orderId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: Environment
          Value: prod
        - Key: Owner
          Value: orders-platform
        - Key: CostCenter
          Value: CC-1042
        - Key: Project
          Value: aiops-changemgmt

  ProductsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-products
      AttributeDefinitions:
        - AttributeName: productId
          AttributeType: S
      KeySchema:
        - AttributeName: productId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: Environment
          Value: prod
        - Key: Owner
          Value: orders-platform
        - Key: CostCenter
          Value: CC-1042
        - Key: Project
          Value: aiops-changemgmt

  InventoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-inventory
      AttributeDefinitions:
        - AttributeName: productId
          AttributeType: S
      KeySchema:
        - AttributeName: productId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: Environment
          Value: prod
        - Key: Owner
          Value: orders-platform
        - Key: CostCenter
          Value: CC-1042
        - Key: Project
          Value: aiops-changemgmt

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub https://${OrdersApi}.execute-api.${AWS::Region}.amazonaws.com/prod/
  OrdersTableName:
    Description: Orders DynamoDB table name
    Value: !Ref OrdersTable
  ProductsTableName:
    Description: Products DynamoDB table name
    Value: !Ref ProductsTable
  InventoryTableName:
    Description: Inventory DynamoDB table name
    Value: !Ref InventoryTable
